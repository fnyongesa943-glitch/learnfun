services:
  - type: web
    name: learnfun
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: learnfun-db
          property: connectionString

databases:
  - name: learnfun-db
    databaseName: learnfun
    plan: free
