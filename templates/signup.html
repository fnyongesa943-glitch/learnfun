{% extends "base.html" %}

{% block title %}Sign Up - LearnFun{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🌟</div>
        <h2>Join LearnFun!</h2>
        <p>Create your account and start learning today!</p>

        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div class="form-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Pick a fun username!" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Your email address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create a password (4+ characters)" required minlength="4">
            </div>

            <div class="form-group">
                <label>Choose Your Avatar</label>
                <input type="hidden" id="avatar-input" name="avatar" value="bear">
                <div class="avatar-selection">
                    <div class="avatar-option selected" data-avatar="bear">🐻</div>
                    <div class="avatar-option" data-avatar="cat">🐱</div>
                    <div class="avatar-option" data-avatar="dog">🐶</div>
                    <div class="avatar-option" data-avatar="fox">🦊</div>
                    <div class="avatar-option" data-avatar="penguin">🐧</div>
                    <div class="avatar-option" data-avatar="lion">🦁</div>
                    <div class="avatar-option" data-avatar="panda">🐼</div>
                    <div class="avatar-option" data-avatar="rabbit">🐰</div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                🎮 Create Account
            </button>
        </form>

        <p class="mt-3">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" style="font-weight: 700;">Log in here!</a>
        </p>
    </div>
</div>
{% endblock %}
