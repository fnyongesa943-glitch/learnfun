{% extends "base.html" %}

{% block title %}Parent Dashboard - LearnFun{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🔒</div>
        <h2>Parent Access</h2>
        <p>Enter PIN to view child progress and settings.</p>

        <form method="POST" action="{{ url_for('parent.check') }}">
            <div class="form-group">
                <label for="pin">4-Digit PIN</label>
                <input type="password" id="pin" name="pin" class="form-control" placeholder="1234" maxlength="4" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                Unlock Dashboard 🔓
            </button>
        </form>

        <p class="mt-3">
            <a href="{{ url_for('parent.login', pin='1234') }}">🔑 Direct Link (PIN: 1234)</a>
        </p>

        <p class="mt-3">
            <a href="{{ url_for('main.index') }}">← Back to Home</a>
        </p>
    </div>
</div>
{% endblock %}
