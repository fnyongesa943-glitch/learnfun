{% extends "base.html" %}

{% block title %}Login - LearnFun{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🔑</div>
        <h2>Welcome Back!</h2>
        <p>Log in to continue your learning adventure!</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper" style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px;">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                🚀 Log In
            </button>
        </form>

        <p class="mt-3">
            Don't have an account?
            <a href="{{ url_for('auth.signup') }}" style="font-weight: 700;">Sign up here!</a>
        </p>
    </div>
</div>

{% block extra_js %}
<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}
</script>
{% endblock %}
{% endblock %}
